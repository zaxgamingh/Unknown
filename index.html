
<!DOCTYPE html>
<html>
<head>
<title>Level 0</title> 

<style>
body {
background-color: #000000;
color: #00ff9c;
font-family: monospace;
text-align: center;
margin-top: 100px; 

animation: flicker 3s infinite;
} 

.binary {
width: 80%;
margin: auto;
word-wrap: break-word;
font-size: 18px;
line-height: 1.6;
} 

@keyframes flicker {
0% { opacity: 1; }
2% { opacity: 0.3; }
4% { opacity: 1; }
19% { opacity: 1; }
21% { opacity: 0.4; }
23% { opacity: 1; }
80% { opacity: 1; }
83% { opacity: 0.5; }
87% { opacity: 1; }
100% { opacity: 1; }
} 

.whisper {
margin-top: 50px;
font-size: 12px;
opacity: 0.6;
} 

button {
margin-top: 30px;
padding: 10px 20px;
background: black;
color: #00ff9c;
border: 1px solid #00ff9c;
cursor: pointer;
}
</style>
</head> 

<body> 

<h2>You were not meant to find this.</h2> 

<p>Decode it.</p> 

<div class="binary">
01101000 01110100 01110100 01110000 01110011 00111010 00101111 00101111 ...
</div> 

<button id="enterBtn" onclick="startExperience()">Enter</button> 

<div class="whisper" id="whisperText">
It is watching.
</div> 

<!-- Audio -->
<audio id="bgAudio" loop>
<source src="BGM.mp3" type="audio/mpeg">
</audio> 

<script>
function startExperience() {
let audio = document.getElementById("bgAudio");
audio.volume = 1;
audio.play(); 

// Hide button
document.getElementById("enterBtn").style.display = "none"; 

// Change whisper after 5 seconds
setTimeout(() => {
document.getElementById("whisperText").innerText = "It knows you're here.";
}, 5000); 

// Change again after 10 seconds
setTimeout(() => {
document.getElementById("whisperText").innerText = "Don't move.";
}, 10000); 

// If user stays idle (no mouse movement)
let idleTimer;
document.onmousemove = () => {
clearTimeout(idleTimer); 

idleTimer = setTimeout(() => {
document.getElementById("whisperText").innerText = "It sees you.";
}, 4000);
};
}
</script> 

</body>
</html>
